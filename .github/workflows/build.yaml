name: Build TortugaLinux
on:
  push:
    branches: [ main ]

jobs:
  build-max:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Free up GitHub runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up QEMU and Buildah/Podman
        uses: docker/setup-qemu-action@v3

      - name: Log into GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push TortugaLinux Max
        run: |
          IMAGE_PATH=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          podman build -f Containerfile.max -t $IMAGE_PATH:max .
          podman push $IMAGE_PATH:max

