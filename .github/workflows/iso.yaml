name: Make and Release TortugaLinux ISOs
on:
  workflow_run:
    workflows: ["Build TortugaLinux"]
    types:
      - completed
    branches: [ main ]

jobs:
  build-isos:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Free up GitHub runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Create output directories
        run: |
          mkdir -p ./output-max
          mkdir -p ./output-min

      - name: Pull TortugaLinux Max Image
        run: |
          IMAGE_PATH=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sudo podman pull $IMAGE_PATH:max

      - name: Build TortugaLinux Max ISO
        run: |
          IMAGE_PATH=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sudo podman run --rm -it --privileged \
            -v ./output-max:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --rootfs btrfs \
            --output /output \
            $IMAGE_PATH:max

      - name: Pull TortugaLinux Min Image
        run: |
          IMAGE_PATH=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sudo podman pull $IMAGE_PATH:min

      - name: Build TortugaLinux Min ISO
        run: |
          IMAGE_PATH=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sudo podman run --rm -it --privileged \
            -v ./output-min:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --rootfs btrfs \
            --output /output \
            $IMAGE_PATH:min

      - name: Rename and Compress ISO files
        run: |
          sudo chown -R $USER:$USER ./output-max ./output-min
          mv ./output-max/bootiso/install.iso ./TortugaLinux-Max-1.0-${{ github.run_number }}.iso
          mv ./output-min/bootiso/install.iso ./TortugaLinux-Min-1.0-${{ github.run_number }}.iso
          zstd --ultra -22 -T0 --long --rm ./TortugaLinux-Max-1.0-${{ github.run_number }}.iso
          zstd --ultra -22 -T0 --long --rm ./TortugaLinux-Min-1.0-${{ github.run_number }}.iso

      - name: Generate Release Tag
        run: echo "RELEASE_TAG=$(date +'%Y.%m.%d')-${{ github.run_number }}" >> $GITHUB_ENV

      - name: Create GitHub Release and Upload ISOs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: TortugaLinux Build ${{ env.RELEASE_TAG }}
          body: |
            ## ${{ env.RELEASE_TAG }}  

            This release was automatically generated by GitHub Actions.  
            
            ### Decompression Instructions
            To bypass storage upload ceilings, these ISOs are compressed using ultra-level **Zstandard (`.zst`)**. You must decompress the file before flashing it to a USB drive or loading it into a virtual machine.  
            
            **Linux / macOS**  
            Install the `zstd` utility via your package manager and extract the file:
            ```bash
            zstd -d TortugaLinux-*.iso.zst
            ```
            
            **Windows**  
            Use a modern archive tool like 7-Zip or WinRAR (make sure to install a good, new version, regardless which software you use) to extract the `.zst` archive back into a standard bootable `.iso` file.  
            
            ---
            _Generated automatically by GitHub Actions Run ID: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_
          files: |
            TortugaLinux-Max-1.0-${{ github.run_number }}.iso.zst
            TortugaLinux-Min-1.0-${{ github.run_number }}.iso.zst
          draft: false
          prerelease: false